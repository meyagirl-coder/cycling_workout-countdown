<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<title>執行頁預覽（上傳 .zwo）</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<style>
  :root {
    --zone-gray: #64748b;
    --zone-blue: #2563eb;
    --zone-green: #16a34a;
    --zone-yellow: #ca8a04;
    --zone-orange: #ea580c;
    --zone-red: #dc2626;
    --zone-purple: #9333ea;
    --zone-none: #334155;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    min-height: 100%;
  }

  body {
    background: #020617;
    color: #f8fafc;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .hidden {
    display: none;
  }

  .app-banner {
    max-width: 480px;
    margin: 0 auto;
    padding: 2.5rem 1.25rem 0.5rem;
    text-align: center;
  }

  .app-banner-title {
    margin: 0 0 0.5rem;
    font-size: 1.6rem;
    font-weight: 900;
    text-wrap: balance;
  }

  .app-banner-subtitle {
    margin: 0;
    color: #94a3b8;
    font-size: 0.9rem;
    text-wrap: balance;
  }

  .upload-screen {
    max-width: 480px;
    margin: 0 auto;
    padding: 3rem 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    text-align: center;
  }

  .upload-title {
    margin: 0;
    font-size: 1.5rem;
    font-weight: 800;
  }

  .upload-ftp-row {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
  }

  .upload-ftp-label {
    font-size: 1rem;
    font-weight: 700;
  }

  .upload-ftp-input-wrap {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.7rem;
    border-radius: 0.75rem;
    border: 1px solid #334155;
    background: #0f172a;
  }

  .upload-ftp-input {
    width: 4rem;
    border: none;
    background: transparent;
    color: #f8fafc;
    font-size: 1rem;
    font-weight: 700;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .upload-ftp-input:focus {
    outline: none;
  }

  .upload-ftp-unit {
    color: #94a3b8;
    font-weight: 700;
  }

  .upload-ftp-hint {
    margin: -0.35rem 0 0;
    color: #64748b;
    font-size: 0.75rem;
    text-align: center;
  }

  .upload-hint {
    margin: 0;
    color: #94a3b8;
    font-size: 0.95rem;
  }

  .upload-dropzone {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 2.5rem 1rem;
    border: 2px dashed #334155;
    border-radius: 1.25rem;
    cursor: pointer;
    color: #cbd5e1;
    font-weight: 700;
  }

  .upload-dropzone:hover,
  .upload-dropzone:focus-within {
    border-color: #60a5fa;
    color: #f8fafc;
  }

  .upload-input {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    opacity: 0;
  }

  .upload-error {
    margin: 0;
    color: #f87171;
    font-size: 0.9rem;
  }

  .player {
    max-width: 480px;
    margin: 0 auto;
    padding: 1.25rem 1rem 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .player-header {
    text-align: center;
  }

  .workout-name {
    margin: 0 0 0.35rem;
    font-size: 1.25rem;
    font-weight: 800;
    text-wrap: balance;
  }

  .workout-meta {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 0.5rem 1rem;
    font-size: 0.9rem;
    color: #94a3b8;
  }

  .timeline {
    position: relative;
    height: 6.5rem;
    background: #0f172a;
    border-radius: 0.75rem;
    overflow: hidden;
  }

  .timeline-track {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .timeline-reference-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px dashed rgba(248, 250, 252, 0.4);
  }

  .timeline-segment {
    position: absolute;
    top: 0;
    bottom: 0;
    background: var(--zone-none);
  }

  .timeline-segment.zone-none {
    background: repeating-linear-gradient(45deg, #1e293b, #1e293b 6px, #0f172a 6px, #0f172a 12px);
  }

  .timeline-divider {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #020617;
    transform: translateX(-1px);
  }

  .timeline-cursor {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 3px;
    background: #f8fafc;
    box-shadow: 0 0 6px rgba(248, 250, 252, 0.9);
    transition: left 0.2s linear;
  }

  .next-interval-banner {
    text-align: center;
    padding: 0.75rem 1rem;
    border-radius: 1rem;
    background: #1e293b;
    border: 1px solid #334155;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .next-interval-banner.hidden {
    display: none;
  }

  .status-panel {
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 1.75rem 0.75rem;
    border-radius: 1.5rem;
    background: var(--zone-none);
    transition: background-color 0.5s ease;
  }

  .countdown-number {
    font-size: 3.5rem;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }

  .countdown-number.countdown-urgent {
    color: #f87171;
    animation: countdown-pulse 1s ease-in-out infinite;
  }

  @keyframes countdown-pulse {
    0%,
    100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.08);
    }
  }

  .elapsed-time {
    margin-top: 0.5rem;
    font-size: 1rem;
    opacity: 0.85;
  }

  /* 瓦數跟 %FTP 兩行文字要同一個字級,不能一個明顯比另一個大或小 */
  .target-watt,
  .target-pct {
    font-size: 1.75rem;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .target-pct {
    margin-top: 0.35rem;
    opacity: 0.85;
  }

  .controls {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 0.6rem;
  }

  .controls .btn-stop {
    grid-column: 1 / -1;
  }

  .btn {
    padding: 0.9rem 0.5rem;
    border: none;
    border-radius: 1rem;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    background: #1e293b;
    color: #f8fafc;
  }

  .btn:focus-visible {
    outline: 2px solid #60a5fa;
    outline-offset: 2px;
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-primary {
    background: #f8fafc;
    color: #020617;
  }

  .btn-danger {
    background: transparent;
    color: #f87171;
    border: 1px solid #7f1d1d;
  }

  .finished-banner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    text-align: center;
    padding: 1.15rem 1rem;
    border-radius: 1rem;
    background: #14532d;
  }

  .finished-banner-text {
    margin: 0;
    font-size: 1.15rem;
    font-weight: 800;
  }

  .btn-return-home {
    background: #f8fafc;
    color: #14532d;
  }

  .finished-banner.hidden {
    display: none;
  }

  .preview-note {
    text-align: center;
    font-size: 0.8rem;
    color: #64748b;
  }

  .zone-gray { background-color: var(--zone-gray); }
  .zone-blue { background-color: var(--zone-blue); }
  .zone-green { background-color: var(--zone-green); }
  .zone-yellow { background-color: var(--zone-yellow); }
  .zone-orange { background-color: var(--zone-orange); }
  .zone-red { background-color: var(--zone-red); }
  .zone-purple { background-color: var(--zone-purple); }
  .zone-none { background-color: var(--zone-none); }

  @media (prefers-reduced-motion: reduce) {
    .timeline-cursor {
      transition: none;
    }
    .countdown-number.countdown-urgent {
      animation: none;
    }
  }
</style>
</head>
<body>
<div id="app">
  <div class="app-banner-mount"></div>
  <div class="upload-mount"></div>
  <div class="player-mount hidden"></div>
</div>

<script>
  // ---- src/constants/powerZones.js ----
  const POWER_ZONES = [
    { key: 'Z1', label: '恢復', maxPct: 55, color: 'gray' },
    { key: 'Z2', label: '有氧耐力', maxPct: 75, color: 'blue' },
    { key: 'Z3', label: '節奏', maxPct: 90, color: 'green' },
    { key: 'Z4', label: '閾值', maxPct: 105, color: 'yellow' },
    { key: 'Z5', label: '最大攝氧', maxPct: 120, color: 'orange' },
    { key: 'Z6', label: '無氧', maxPct: 150, color: 'red' },
    { key: 'Z7', label: '神經肌力', maxPct: Infinity, color: 'purple' },
  ];

  function getZoneColor(pct) {
    if (pct < 55) return zoneInfo(POWER_ZONES[0]);
    for (let i = 1; i < POWER_ZONES.length; i++) {
      if (pct <= POWER_ZONES[i].maxPct) return zoneInfo(POWER_ZONES[i]);
    }
    return zoneInfo(POWER_ZONES[POWER_ZONES.length - 1]);
  }

  function zoneInfo(zone) {
    return { key: zone.key, label: zone.label, color: zone.color };
  }

  // ---- src/parser/zwoParser.js ----
  const ZWO_TAG_TYPE_MAP = {
    warmup: 'warmup',
    steadystate: 'steady',
    ramp: 'ramp',
    freeride: 'freeride',
    cooldown: 'cooldown',
  };

  function parseZwoXml(xmlString) {
    if (typeof xmlString !== 'string' || xmlString.trim() === '') {
      throw new Error('Invalid ZWO XML: input must be a non-empty string');
    }

    const doc = new DOMParser().parseFromString(xmlString, 'application/xml');

    const parserError = doc.querySelector('parsererror');
    if (parserError) {
      throw new Error(`Invalid ZWO XML: failed to parse XML (${parserError.textContent.trim()})`);
    }

    const root = doc.querySelector('workout_file');
    if (!root) {
      throw new Error('Invalid ZWO XML: missing <workout_file> root element');
    }

    const workoutEl = root.querySelector('workout');
    if (!workoutEl) {
      throw new Error('Invalid ZWO XML: missing <workout> element');
    }

    const nameEl = root.querySelector('name');
    const name = nameEl && nameEl.textContent.trim() ? nameEl.textContent.trim() : 'Untitled Workout';

    const intervals = [];
    for (const el of Array.from(workoutEl.children)) {
      const tag = el.tagName.toLowerCase();

      if (tag === 'intervalst') {
        intervals.push(...parseZwoIntervalsTElement(el));
        continue;
      }

      const type = ZWO_TAG_TYPE_MAP[tag];
      if (!type) continue;
      intervals.push(parseZwoIntervalElement(el, type));
    }

    if (intervals.length === 0) {
      throw new Error('Invalid ZWO XML: no supported interval elements found in <workout>');
    }

    const totalDuration = intervals.reduce((sum, iv) => sum + iv.duration, 0);

    return { id: generateWorkoutId(), name, source: 'zwo', totalDuration, intervals };
  }

  function parseZwoIntervalElement(el, type) {
    const duration = parseZwoIntAttr(el, 'Duration');
    if (duration === null) {
      throw new Error(`Invalid ZWO XML: <${el.tagName}> is missing a required Duration attribute`);
    }

    const cadence = parseZwoIntAttr(el, 'Cadence');

    if (type === 'steady') {
      const power = parseZwoPowerAttr(el, 'Power');
      if (power !== null) {
        return { type: 'steady', duration, powerStart: power, powerEnd: power, cadence };
      }
      const powerLow = parseZwoPowerAttr(el, 'PowerLow');
      const powerHigh = parseZwoPowerAttr(el, 'PowerHigh');
      if (powerLow === null || powerHigh === null) {
        throw new Error(`Invalid ZWO XML: <${el.tagName}> is missing a required Power attribute (or PowerLow/PowerHigh)`);
      }
      return { type: 'ramp', duration, powerStart: powerLow, powerEnd: powerHigh, cadence };
    }

    if (type === 'warmup' || type === 'ramp' || type === 'cooldown') {
      const powerStart = parseZwoPowerAttr(el, 'PowerLow');
      const powerEnd = parseZwoPowerAttr(el, 'PowerHigh');
      if (powerStart === null || powerEnd === null) {
        throw new Error(`Invalid ZWO XML: <${el.tagName}> is missing PowerLow/PowerHigh attributes`);
      }
      return { type, duration, powerStart, powerEnd, cadence };
    }

    return { type, duration, powerStart: null, powerEnd: null, cadence };
  }

  function parseZwoIntervalsTElement(el) {
    const repeat = parseZwoIntAttr(el, 'Repeat');
    if (repeat === null || repeat <= 0) {
      throw new Error(`Invalid ZWO XML: <${el.tagName}> is missing a required Repeat attribute`);
    }

    const onDuration = parseZwoIntAttr(el, 'OnDuration');
    const offDuration = parseZwoIntAttr(el, 'OffDuration');
    if (onDuration === null || offDuration === null) {
      throw new Error(`Invalid ZWO XML: <${el.tagName}> is missing OnDuration/OffDuration attributes`);
    }

    const onPower = parseZwoPowerAttr(el, 'OnPower');
    const offPower = parseZwoPowerAttr(el, 'OffPower');
    if (onPower === null || offPower === null) {
      throw new Error(`Invalid ZWO XML: <${el.tagName}> is missing OnPower/OffPower attributes`);
    }

    const onCadence = parseZwoIntAttr(el, 'Cadence');
    const offCadence = parseZwoIntAttr(el, 'CadenceResting');

    const expanded = [];
    for (let i = 0; i < repeat; i++) {
      expanded.push({ type: 'steady', duration: onDuration, powerStart: onPower, powerEnd: onPower, cadence: onCadence });
      expanded.push({ type: 'steady', duration: offDuration, powerStart: offPower, powerEnd: offPower, cadence: offCadence });
    }
    return expanded;
  }

  function parseZwoIntAttr(el, attrName) {
    const raw = el.getAttribute(attrName);
    if (raw === null || raw === '') return null;
    const value = Number(raw);
    if (Number.isNaN(value)) return null;
    return Math.round(value);
  }

  function parseZwoPowerAttr(el, attrName) {
    const raw = el.getAttribute(attrName);
    if (raw === null || raw === '') return null;
    const value = Number(raw);
    if (Number.isNaN(value)) return null;
    return Math.round(value * 100);
  }

  function generateWorkoutId() {
    if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
      return crypto.randomUUID();
    }
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, (c) => {
      const r = (Math.random() * 16) | 0;
      const v = c === 'x' ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }

  // ---- src/ui/appBanner.js ----
  function createAppBanner(rootEl) {
    rootEl.innerHTML = `
      <header class="app-banner">
        <h1 class="app-banner-title">自行車訓練課表播放器</h1>
        <p class="app-banner-subtitle">上傳課表檔案或連結 intervals.icu，開始你的結構化訓練</p>
      </header>
    `;
    const bannerEl = rootEl.querySelector('.app-banner');
    return {
      show() {
        bannerEl.classList.remove('hidden');
      },
      hide() {
        bannerEl.classList.add('hidden');
      },
    };
  }

  // ---- src/ui/uploadView.js ----
  function createUploadView(rootEl, handlers) {
    rootEl.innerHTML = `
      <div class="upload-screen">
        <div class="upload-ftp-row">
          <label class="upload-ftp-label" for="upload-ftp-input">你的 FTP</label>
          <div class="upload-ftp-input-wrap">
            <input type="number" id="upload-ftp-input" class="upload-ftp-input" min="1" step="1" inputmode="numeric" />
            <span class="upload-ftp-unit">W</span>
          </div>
        </div>
        <p class="upload-ftp-hint">之後可以隨時回來這裡修改，瓦數會立即依新的 FTP 重新計算</p>

        <h1 class="upload-title">上傳課表</h1>
        <p class="upload-hint">選擇一份 .zwo 課表檔案（Zwift workout file）開始訓練</p>
        <label class="upload-dropzone">
          <input type="file" accept=".zwo,application/xml,text/xml" class="upload-input" />
          <span>點一下選擇 .zwo 檔案</span>
        </label>
        <p class="upload-error hidden"></p>
      </div>
    `;

    const input = rootEl.querySelector('.upload-input');
    const errorEl = rootEl.querySelector('.upload-error');
    const ftpInput = rootEl.querySelector('.upload-ftp-input');

    ftpInput.addEventListener('input', () => {
      const value = Number(ftpInput.value);
      if (Number.isFinite(value) && value > 0) handlers.onFtpChange(Math.round(value));
    });

    input.addEventListener('change', () => {
      const file = input.files && input.files[0];
      input.value = '';
      if (file) handlers.onFileSelected(file);
    });

    return {
      showError(message) {
        errorEl.textContent = message;
        errorEl.classList.remove('hidden');
      },
      clearError() {
        errorEl.textContent = '';
        errorEl.classList.add('hidden');
      },
      setFtpValue(ftp) {
        ftpInput.value = ftp;
      },
    };
  }

  // ---- src/engine/timerEngine.js ----
  const TIMER_EVENTS = {
    COUNTDOWN_WARNING: 'countdownWarning',
    INTERVAL_CHANGED: 'intervalChanged',
    WORKOUT_FINISHED: 'workoutFinished',
  };

  const COUNTDOWN_WARNING_SECONDS = 10;

  function computeCurrentTarget(workout, intervalIndex, elapsedInInterval, ftp, adjustPct = 0) {
    const iv = workout.intervals[intervalIndex];
    if (!iv) throw new Error(`computeCurrentTarget: no interval at index ${intervalIndex}`);
    if (iv.type === 'freeride') return { watts: null, pct: null };

    const ratio = iv.duration > 0 ? clamp01(elapsedInInterval / iv.duration) : 0;
    const pct = iv.powerStart + (iv.powerEnd - iv.powerStart) * ratio;
    const adjustedPct = pct + adjustPct;
    const watts = Math.round((ftp * adjustedPct) / 100);
    return { watts, pct: adjustedPct, zoneColor: getZoneColor(adjustedPct) };
  }

  function createTimerEngine(workout) {
    let status = 'idle';
    let elapsedTotal = 0;
    let startTimestamp = null;
    let powerAdjustPct = 0;

    function refreshElapsedIfRunning(now) {
      if (status === 'running') elapsedTotal = Math.max(0, (now - startTimestamp) / 1000);
    }

    function buildState() {
      const { index, elapsedInInterval } = locateIntervalAt(workout, elapsedTotal);
      return { status, currentIntervalIndex: index, elapsedInInterval, elapsedTotal, powerAdjustPct, startTimestamp };
    }

    function result(events) {
      return { state: buildState(), events };
    }

    function play(now = Date.now()) {
      if (status === 'idle' || status === 'paused') {
        status = 'running';
        startTimestamp = now - elapsedTotal * 1000;
      }
      return result([]);
    }

    function pause(now = Date.now()) {
      if (status === 'running') {
        refreshElapsedIfRunning(now);
        status = 'paused';
        startTimestamp = null;
      }
      return result([]);
    }

    function skip(now = Date.now()) {
      refreshElapsedIfRunning(now);
      const { index } = locateIntervalAt(workout, elapsedTotal);
      const nextIndex = index + 1;
      const events = [];
      if (nextIndex >= workout.intervals.length) {
        elapsedTotal = workout.totalDuration;
        if (status !== 'finished') {
          status = 'finished';
          events.push(TIMER_EVENTS.WORKOUT_FINISHED);
        }
      } else {
        elapsedTotal = cumulativeStart(workout, nextIndex);
        events.push(TIMER_EVENTS.INTERVAL_CHANGED);
      }
      if (status === 'running') startTimestamp = now - elapsedTotal * 1000;
      return result(events);
    }

    function redo(now = Date.now()) {
      refreshElapsedIfRunning(now);
      const { index } = locateIntervalAt(workout, elapsedTotal);
      elapsedTotal = cumulativeStart(workout, index);
      if (status === 'running') startTimestamp = now - elapsedTotal * 1000;
      return result([]);
    }

    function stop(now = Date.now()) {
      refreshElapsedIfRunning(now);
      const events = status !== 'finished' ? [TIMER_EVENTS.WORKOUT_FINISHED] : [];
      status = 'finished';
      startTimestamp = null;
      return result(events);
    }

    function adjustPower(deltaPct) {
      powerAdjustPct += deltaPct;
      return result([]);
    }

    function tick(now = Date.now()) {
      if (status !== 'running') return result([]);
      const before = locateIntervalAt(workout, elapsedTotal);
      const prevRemaining = workout.intervals[before.index].duration - before.elapsedInInterval;
      elapsedTotal = Math.max(0, (now - startTimestamp) / 1000);
      const after = locateIntervalAt(workout, elapsedTotal);
      const events = [];
      if (after.finished) {
        status = 'finished';
        events.push(TIMER_EVENTS.WORKOUT_FINISHED);
      } else if (after.index !== before.index) {
        events.push(TIMER_EVENTS.INTERVAL_CHANGED);
      } else {
        const duration = workout.intervals[after.index].duration;
        const remaining = duration - after.elapsedInInterval;
        if (duration > COUNTDOWN_WARNING_SECONDS && prevRemaining > COUNTDOWN_WARNING_SECONDS && remaining <= COUNTDOWN_WARNING_SECONDS) {
          events.push(TIMER_EVENTS.COUNTDOWN_WARNING);
        }
      }
      return result(events);
    }

    function getState() {
      return buildState();
    }

    return { play, pause, skip, redo, stop, adjustPower, tick, getState };
  }

  function clamp01(value) {
    return Math.min(1, Math.max(0, value));
  }

  function cumulativeStart(workout, index) {
    let acc = 0;
    for (let i = 0; i < index; i++) acc += workout.intervals[i].duration;
    return acc;
  }

  function locateIntervalAt(workout, elapsedTotal) {
    const clamped = Math.max(0, elapsedTotal);
    let acc = 0;
    for (let i = 0; i < workout.intervals.length; i++) {
      const duration = workout.intervals[i].duration;
      if (clamped < acc + duration) return { index: i, elapsedInInterval: clamped - acc, finished: false };
      acc += duration;
    }
    const lastIndex = workout.intervals.length - 1;
    return { index: lastIndex, elapsedInInterval: workout.intervals[lastIndex].duration, finished: true };
  }

  // ---- src/ui/formatTime.js ----
  function formatMMSS(totalSeconds) {
    const clamped = Math.max(0, Math.round(totalSeconds));
    const minutes = Math.floor(clamped / 60);
    const seconds = clamped % 60;
    return `${minutes}:${String(seconds).padStart(2, '0')}`;
  }

  function formatDurationLabel(totalSeconds) {
    const clamped = Math.max(0, Math.round(totalSeconds));
    const hours = Math.floor(clamped / 3600);
    const minutes = Math.floor((clamped % 3600) / 60);
    const seconds = clamped % 60;
    if (hours > 0) return `${hours}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    return `${minutes}:${String(seconds).padStart(2, '0')}`;
  }

  // ---- src/ui/timelineSegments.js ----
  const ZONE_BOUNDARIES = [55, 75, 90, 105, 120, 150];

  function sliceIntervalByZone(iv) {
    if (iv.type === 'freeride' || iv.powerStart === null || iv.powerEnd === null) {
      return [{ startOffset: 0, endOffset: iv.duration, color: null, startPowerPct: null, endPowerPct: null }];
    }

    const { duration, powerStart, powerEnd } = iv;

    if (duration <= 0 || powerStart === powerEnd) {
      return [
        { startOffset: 0, endOffset: duration, color: getZoneColor(powerStart).color, startPowerPct: powerStart, endPowerPct: powerStart },
      ];
    }

    const lo = Math.min(powerStart, powerEnd);
    const hi = Math.max(powerStart, powerEnd);

    const offsets = new Set([0, duration]);
    for (const boundary of ZONE_BOUNDARIES) {
      if (boundary > lo && boundary < hi) {
        const ratio = (boundary - powerStart) / (powerEnd - powerStart);
        offsets.add(ratio * duration);
      }
    }

    const sorted = Array.from(offsets).sort((a, b) => a - b);
    const slices = [];
    for (let i = 0; i < sorted.length - 1; i++) {
      const startOffset = sorted[i];
      const endOffset = sorted[i + 1];
      const startPowerPct = powerStart + (powerEnd - powerStart) * (startOffset / duration);
      const endPowerPct = powerStart + (powerEnd - powerStart) * (endOffset / duration);
      const midPct = (startPowerPct + endPowerPct) / 2;
      slices.push({ startOffset, endOffset, color: getZoneColor(midPct).color, startPowerPct, endPowerPct });
    }
    return slices;
  }

  function buildTimelineSegments(workout, adjustPct = 0) {
    const total = workout.totalDuration;
    let acc = 0;
    const segments = [];

    workout.intervals.forEach((iv, intervalIndex) => {
      const shifted =
        iv.powerStart === null || iv.powerEnd === null
          ? iv
          : { ...iv, powerStart: iv.powerStart + adjustPct, powerEnd: iv.powerEnd + adjustPct };

      for (const slice of sliceIntervalByZone(shifted)) {
        const startPct = total > 0 ? ((acc + slice.startOffset) / total) * 100 : 0;
        const widthPct = total > 0 ? ((slice.endOffset - slice.startOffset) / total) * 100 : 0;
        segments.push({
          type: iv.type,
          intervalIndex,
          startPct,
          widthPct,
          color: slice.color,
          startPowerPct: slice.startPowerPct,
          endPowerPct: slice.endPowerPct,
        });
      }
      acc += iv.duration;
    });

    return segments;
  }

  const CHART_SCALE_MAX_PCT = 160;
  const CHART_REFERENCE_LINE_PCT = 100;

  function computeBarHeightPct(powerPct) {
    if (powerPct === null || powerPct === undefined) return 0;
    return Math.min(100, Math.max(0, (powerPct / CHART_SCALE_MAX_PCT) * 100));
  }

  function buildIntervalBoundaries(workout) {
    const total = workout.totalDuration;
    if (total <= 0) return [];
    let acc = 0;
    const boundaries = [];
    for (let i = 0; i < workout.intervals.length - 1; i++) {
      acc += workout.intervals[i].duration;
      boundaries.push((acc / total) * 100);
    }
    return boundaries;
  }

  function computeCursorPct(elapsedTotal, totalDuration) {
    if (totalDuration <= 0) return 0;
    return Math.min(100, Math.max(0, (elapsedTotal / totalDuration) * 100));
  }

  // ---- src/ui/renderPlayer.js ----
  const INTERVAL_TYPE_LABELS = { warmup: '熱身', steady: '穩定', ramp: '漸變', freeride: '自由騎乘', cooldown: '收操' };
  const STATUS_LABELS = { idle: '尚未開始', running: '進行中', paused: '已暫停', finished: '已完成' };
  const COUNTDOWN_URGENT_SECONDS = 10;
  const NEXT_INTERVAL_BANNER_MS = 5000;
  const FREERIDE_BAR_HEIGHT_PCT = 12;

  function createPlayerView(rootEl, handlers) {
    rootEl.innerHTML = `
      <div class="player">
        <header class="player-header">
          <h1 class="workout-name"></h1>
          <div class="workout-meta">
            <span class="total-duration"></span>
            <span class="interval-progress"></span>
          </div>
        </header>
        <div class="timeline">
          <div class="timeline-reference-line"></div>
          <div class="timeline-track"></div>
          <div class="timeline-cursor"></div>
        </div>
        <div class="next-interval-banner hidden"></div>
        <div class="status-panel">
          <div class="countdown-block">
            <div class="countdown-number">0:00</div>
            <div class="elapsed-time"></div>
          </div>
          <div class="target-block">
            <div class="target-watt">--</div>
            <div class="target-pct"></div>
          </div>
        </div>
        <div class="controls">
          <button type="button" class="btn btn-skip">跳組</button>
          <button type="button" class="btn btn-play-pause btn-primary">▶ 開始</button>
          <button type="button" class="btn btn-redo">重做本組</button>
          <button type="button" class="btn btn-stop btn-danger">提早結束</button>
        </div>
        <div class="finished-banner hidden">
          <p class="finished-banner-text">課表完成！</p>
          <button type="button" class="btn btn-return-home">回到主畫面</button>
        </div>
        <p class="preview-note">FTP 暫定 200W（尚未接上設定頁）</p>
      </div>
    `;

    const els = {
      workoutName: rootEl.querySelector('.workout-name'),
      totalDuration: rootEl.querySelector('.total-duration'),
      intervalProgress: rootEl.querySelector('.interval-progress'),
      timelineTrack: rootEl.querySelector('.timeline-track'),
      timelineCursor: rootEl.querySelector('.timeline-cursor'),
      timelineReferenceLine: rootEl.querySelector('.timeline-reference-line'),
      nextIntervalBanner: rootEl.querySelector('.next-interval-banner'),
      statusPanel: rootEl.querySelector('.status-panel'),
      countdownNumber: rootEl.querySelector('.countdown-number'),
      elapsedTime: rootEl.querySelector('.elapsed-time'),
      targetWatt: rootEl.querySelector('.target-watt'),
      targetPct: rootEl.querySelector('.target-pct'),
      playPauseBtn: rootEl.querySelector('.btn-play-pause'),
      skipBtn: rootEl.querySelector('.btn-skip'),
      redoBtn: rootEl.querySelector('.btn-redo'),
      stopBtn: rootEl.querySelector('.btn-stop'),
      finishedBanner: rootEl.querySelector('.finished-banner'),
      returnHomeBtn: rootEl.querySelector('.btn-return-home'),
    };

    els.playPauseBtn.addEventListener('click', () => handlers.onPlayPause());
    els.skipBtn.addEventListener('click', () => handlers.onSkip());
    els.redoBtn.addEventListener('click', () => handlers.onRedo());
    els.stopBtn.addEventListener('click', () => handlers.onStop());
    els.returnHomeBtn.addEventListener('click', () => handlers.onReturnHome());

    els.timelineReferenceLine.style.top = `${100 - computeBarHeightPct(CHART_REFERENCE_LINE_PCT)}%`;

    let renderedTimelineKey = null;

    function renderTimelineIfNeeded(workout, adjustPct) {
      const key = `${workout.id}::${adjustPct}`;
      if (renderedTimelineKey === key) return;
      renderedTimelineKey = key;

      const segments = buildTimelineSegments(workout, adjustPct);
      const segmentsHtml = segments
        .map((seg) => {
          const isFreeride = seg.color === null;
          const startHeightPct = isFreeride ? FREERIDE_BAR_HEIGHT_PCT : computeBarHeightPct(seg.startPowerPct);
          const endHeightPct = isFreeride ? FREERIDE_BAR_HEIGHT_PCT : computeBarHeightPct(seg.endPowerPct);
          const clipPath = `polygon(0% ${100 - startHeightPct}%, 100% ${100 - endHeightPct}%, 100% 100%, 0% 100%)`;
          return `<div class="timeline-segment ${isFreeride ? 'zone-none' : `zone-${seg.color}`}" style="left:${seg.startPct}%;width:${seg.widthPct}%;clip-path:${clipPath}" title="${INTERVAL_TYPE_LABELS[seg.type]}"></div>`;
        })
        .join('');

      const dividersHtml = buildIntervalBoundaries(workout)
        .map((pct) => `<div class="timeline-divider" style="left:${pct}%"></div>`)
        .join('');

      els.timelineTrack.innerHTML = segmentsHtml + dividersHtml;
    }

    let nextIntervalBannerTimeoutId = null;

    function hideNextIntervalBannerNow() {
      if (nextIntervalBannerTimeoutId !== null) {
        clearTimeout(nextIntervalBannerTimeoutId);
        nextIntervalBannerTimeoutId = null;
      }
      els.nextIntervalBanner.classList.add('hidden');
    }

    function update(workout, state, ftp) {
      renderTimelineIfNeeded(workout, state.powerAdjustPct);
      if (state.status === 'idle') hideNextIntervalBannerNow();
      els.workoutName.textContent = workout.name;
      els.totalDuration.textContent = `總時長 ${formatDurationLabel(workout.totalDuration)}`;
      els.intervalProgress.textContent = `第 ${state.currentIntervalIndex + 1} / ${workout.intervals.length} 組 · ${STATUS_LABELS[state.status]}`;
      els.timelineCursor.style.left = `${computeCursorPct(state.elapsedTotal, workout.totalDuration)}%`;

      const currentInterval = workout.intervals[state.currentIntervalIndex];
      const remaining = currentInterval.duration - state.elapsedInInterval;
      els.countdownNumber.textContent = formatMMSS(remaining);
      els.elapsedTime.textContent = `經過時間 ${formatDurationLabel(state.elapsedTotal)}`;

      const isCountdownUrgent = currentInterval.duration > COUNTDOWN_URGENT_SECONDS && remaining > 0 && remaining <= COUNTDOWN_URGENT_SECONDS;
      els.countdownNumber.classList.toggle('countdown-urgent', isCountdownUrgent);

      const target = computeCurrentTarget(workout, state.currentIntervalIndex, state.elapsedInInterval, ftp, state.powerAdjustPct);
      if (target.watts === null) {
        els.targetWatt.textContent = '自由騎乘';
        els.targetPct.textContent = '';
        els.statusPanel.className = 'status-panel zone-none';
      } else {
        els.targetWatt.textContent = `${target.watts} W`;
        els.targetPct.textContent = `${Math.round(target.pct)}% FTP`;
        els.statusPanel.className = `status-panel zone-${target.zoneColor.color}`;
      }

      const isFinished = state.status === 'finished';
      els.playPauseBtn.textContent = state.status === 'running' ? '⏸ 暫停' : '▶ 開始';
      els.playPauseBtn.disabled = isFinished;
      els.skipBtn.disabled = isFinished;
      els.redoBtn.disabled = isFinished;
      els.stopBtn.disabled = isFinished;
      els.finishedBanner.classList.toggle('hidden', !isFinished);
    }

    function showNextIntervalBanner(text) {
      els.nextIntervalBanner.textContent = text;
      els.nextIntervalBanner.classList.remove('hidden');
      if (nextIntervalBannerTimeoutId !== null) clearTimeout(nextIntervalBannerTimeoutId);
      nextIntervalBannerTimeoutId = setTimeout(() => {
        nextIntervalBannerTimeoutId = null;
        els.nextIntervalBanner.classList.add('hidden');
      }, NEXT_INTERVAL_BANNER_MS);
    }

    return { update, showNextIntervalBanner };
  }

  // ---- src/ui/countdownAlerts.js ----
  const COUNTDOWN_SPEECH_TEXT = '10 秒後切換下一組';

  function handleTimerEvents(events, { workout, state, ftp, playBeep, speak, showNextIntervalBanner }) {
    if (events.includes(TIMER_EVENTS.COUNTDOWN_WARNING)) {
      playBeep();
      speak(COUNTDOWN_SPEECH_TEXT);
    }
    if (events.includes(TIMER_EVENTS.INTERVAL_CHANGED)) {
      showNextIntervalBanner(formatNextIntervalText(workout, state, ftp));
    }
  }

  function formatNextIntervalText(workout, state, ftp) {
    const iv = workout.intervals[state.currentIntervalIndex];
    const typeLabel = INTERVAL_TYPE_LABELS[iv.type];
    const durationLabel = formatMMSS(iv.duration);
    const target = computeCurrentTarget(workout, state.currentIntervalIndex, 0, ftp, state.powerAdjustPct);
    if (target.watts === null) return `下一組：${typeLabel} · ${durationLabel}`;
    return `下一組：${typeLabel} · ${durationLabel} · ${Math.round(target.pct)}% FTP · ${target.watts}W`;
  }

  let sharedAudioContext = null;

  function playCountdownBeep() {
    const AudioContextCtor = typeof window !== 'undefined' && (window.AudioContext || window.webkitAudioContext);
    if (!AudioContextCtor) return;
    if (!sharedAudioContext) sharedAudioContext = new AudioContextCtor();
    const ctx = sharedAudioContext;
    const oscillator = ctx.createOscillator();
    const gain = ctx.createGain();
    oscillator.connect(gain);
    gain.connect(ctx.destination);
    oscillator.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.3);
    oscillator.start();
    oscillator.stop(ctx.currentTime + 0.3);
  }

  function speakCountdownWarning(text) {
    if (typeof window === 'undefined' || !window.speechSynthesis || typeof SpeechSynthesisUtterance === 'undefined') return;
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-TW';
    window.speechSynthesis.speak(utterance);
  }

  // ---- src/ui/ftpStore.js ----
  const FTP_STORAGE_KEY = 'user_ftp';
  const DEFAULT_FTP = 200;

  function loadFtp(storage = window.localStorage) {
    const raw = storage.getItem(FTP_STORAGE_KEY);
    if (raw === null) return null;
    const value = Number(raw);
    if (!Number.isFinite(value) || value <= 0) return null;
    return Math.round(value);
  }

  function saveFtp(ftp, storage = window.localStorage) {
    storage.setItem(FTP_STORAGE_KEY, String(Math.round(ftp)));
  }

  // ---- driver (same role as src/ui/playerApp.js, single-thread for this preview instead of a Web Worker) ----
  const bannerMount = document.querySelector('.app-banner-mount');
  const uploadMount = document.querySelector('.upload-mount');
  const playerMount = document.querySelector('.player-mount');

  const appBanner = createAppBanner(bannerMount);

  let engine = null;
  let currentWorkout = null;
  let intervalId = null;
  let currentFtp = loadFtp() ?? DEFAULT_FTP;

  const uploadView = createUploadView(uploadMount, {
    onFileSelected: (file) => handleFileSelected(file),
    onFtpChange: (ftp) => {
      currentFtp = ftp;
      saveFtp(ftp);
      if (currentWorkout) render();
    },
  });
  uploadView.setFtpValue(currentFtp);

  const playerView = createPlayerView(playerMount, {
    onPlayPause: () => {
      const { status } = engine.getState();
      let result;
      if (status === 'running') {
        result = engine.pause();
        stopLoop();
      } else {
        result = engine.play();
        startLoop();
      }
      applyEngineResult(result.events);
    },
    onSkip: () => {
      const result = engine.skip();
      stopLoopIfFinished();
      applyEngineResult(result.events);
    },
    onRedo: () => {
      applyEngineResult(engine.redo().events);
    },
    onStop: () => {
      const result = engine.stop();
      stopLoop();
      applyEngineResult(result.events);
    },
    onReturnHome: () => {
      playerMount.classList.add('hidden');
      uploadMount.classList.remove('hidden');
      appBanner.show();
      uploadView.clearError();
      currentWorkout = null;
    },
  });

  async function handleFileSelected(file) {
    uploadView.clearError();

    let xmlText;
    try {
      xmlText = await file.text();
    } catch {
      uploadView.showError('讀取檔案失敗，請再試一次。');
      return;
    }

    let workout;
    try {
      workout = parseZwoXml(xmlText);
    } catch (err) {
      uploadView.showError(`無法解析這份 .zwo 檔案：${err.message}`);
      return;
    }

    currentWorkout = workout;
    engine = createTimerEngine(workout);
    appBanner.hide();
    uploadMount.classList.add('hidden');
    playerMount.classList.remove('hidden');
    render();
  }

  function startLoop() {
    if (intervalId !== null) return;
    intervalId = setInterval(() => {
      const result = engine.tick(Date.now());
      stopLoopIfFinished();
      applyEngineResult(result.events);
    }, 200);
  }

  function stopLoop() {
    if (intervalId !== null) {
      clearInterval(intervalId);
      intervalId = null;
    }
  }

  function stopLoopIfFinished() {
    if (engine.getState().status === 'finished') stopLoop();
  }

  function render() {
    if (currentWorkout) playerView.update(currentWorkout, engine.getState(), currentFtp);
  }

  /** 每次 engine 動作（tick 或按鈕）後統一重繪＋處理倒數提示事件（規格 §4.4） */
  function applyEngineResult(events) {
    render();
    if (!currentWorkout) return;
    handleTimerEvents(events, {
      workout: currentWorkout,
      state: engine.getState(),
      ftp: currentFtp,
      playBeep: playCountdownBeep,
      speak: speakCountdownWarning,
      showNextIntervalBanner: playerView.showNextIntervalBanner,
    });
  }
</script>
</body>
</html>
